{{ if and .Site.Params.adsense (eq hugo.Environment "production") }}
<div class="adsense" style="margin:24px 0;text-align:center;">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adsenseClient }}" crossorigin="anonymous"></script>
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ .Site.Params.adsenseClient }}"
       data-ad-slot="{{ .slot }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{ end }}
