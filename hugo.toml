baseURL = "https://yakiimo-tech.com/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "やきいもテック - セキュリティ＆AIツール研究ラボ"
theme = "PaperMod"

hasCJKLanguage = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "やきいもテック"
  description = "セキュリティ・AIツール・自動化に関する実務に使える知見を発信しています。"
  author = "やきいも"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = false
  comments = false

# トップページをプロフィールモードに（アイコン＋自己紹介＋ボタン）
[params.profileMode]
  enabled = true
  title = "やきいもテック"
  subtitle = "セキュリティ・AIツール・自動化に関する実務に使える知見を発信しています。"
  imageUrl = "/images/profile.jpg"
  imageTitle = "やきいもテック"
  imageWidth = 120
  imageHeight = 120

[[params.profileMode.buttons]]
  name = "📝 記事一覧"
  url = "/posts/"

[[params.profileMode.buttons]]
  name = "✉️ お問い合わせ"
  url = "/contact/"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# ==================== メニュー設定 ====================
[[menu.main]]
  identifier = "archives"
  name = "記事一覧"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "privacy"
  name = "プライバシーポリシー"
  url = "/privacy-policy/"
  weight = 20

[[menu.main]]
  identifier = "contact"
  name = "お問い合わせ"
  url = "/contact/"
  weight = 30

# ==================== 収益化・アクセス解析設定 ====================
# Google AdSense（審査通過後、下記2行のコメントを解除してIDを設定）
# [params] セクション内で有効化される仕組み
# ↓ [params] 内に追加する形で有効化
# adsense = true
# adsenseClient = "ca-pub-XXXXXXXXXXXXXX"

# Google Analytics 4（測定ID取得後、下記 [services] ブロックを有効化）
# [services]
#   [services.googleAnalytics]
#     ID = "G-XXXXXXXXXX"
